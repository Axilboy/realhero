# Пример для nginx: статика SPA из /PROGS/RH/www + API (Fastify) на localhost:3000
# Важно: блок /api/ должен быть ДО location /, иначе try_files отдаст index.html на /api/...
# Cloudflare Tunnel: указывайте на этот nginx (или другой хост с таким же split), не на голую папку www.

server {
    listen 80;
    server_name _;  # замените на домен

    root /PROGS/RH/www;
    index index.html;

    # API (OAuth, /me, logout). На сервере: pm2/systemd для `cd api && npm start`
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Если TLS только на Cloudflare / cloudflared, а nginx видит HTTP, $scheme будет http —
        # тогда замените на: proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
