# Полный пример server { } для Real Hero на сервере.
# Путь статики и порт API совпадают с типичным деплоем в /PROGS/RH/www.
#
# Установка (один раз):
#   sudo cp nginx-realhero.conf /etc/nginx/sites-available/realhero.conf
#   sudo ln -sf /etc/nginx/sites-available/realhero.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Cloudflare Tunnel ведите на этот nginx (например http://127.0.0.1:80), не на каталог www.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /PROGS/RH/www;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Туннель с HTTPS снаружи, nginx слушает HTTP — так cookie и Fastify видят «https»:
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# --- Если API слушает 3001 (порт 3000 занят Docker) ---
# В location /api/ замените одну строку на:
#     proxy_pass http://127.0.0.1:3001;
# И в api/.env укажите: PORT=3001
