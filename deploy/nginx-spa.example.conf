# Пример для nginx: статика SPA из /PROGS/RH/www
# Скопируйте в sites-available и подключите server_name / ssl.

server {
    listen 80;
    server_name _;  # замените на домен

    root /PROGS/RH/www;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
